<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" width="1100" height="680" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="680" fill="#0f1117"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="bold">Ghobrial Lab — Pipeline Agent System</text>

  <!-- ── LEGEND ── -->
  <rect x="30" y="60" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="50" y="72" fill="#94a3b8" font-size="14">Agent</text>
  <rect x="120" y="60" width="14" height="14" rx="3" fill="#8b5cf6"/>
  <text x="140" y="72" fill="#94a3b8" font-size="14">Skill</text>
  <rect x="210" y="60" width="14" height="14" rx="3" fill="#10b981"/>
  <text x="230" y="72" fill="#94a3b8" font-size="14">Command</text>

  <!-- ══════════════════════════════════════════
       NODES
  ══════════════════════════════════════════ -->

  <!-- USER (top-left) -->
  <ellipse cx="120" cy="200" rx="72" ry="34" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="120" y="196" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">User</text>
  <text x="120" y="214" text-anchor="middle" fill="#94a3b8" font-size="12">triggers build</text>

  <!-- TRINITY (center) -->
  <rect x="390" y="150" width="200" height="88" rx="10" fill="#1d3a6b" stroke="#3b82f6" stroke-width="2"/>
  <text x="490" y="178" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">Trinity</text>
  <text x="490" y="197" text-anchor="middle" fill="#bfdbfe" font-size="13">Orchestrator</text>
  <text x="490" y="214" text-anchor="middle" fill="#94a3b8" font-size="12">End-to-end pipeline creation</text>
  <text x="490" y="230" text-anchor="middle" fill="#94a3b8" font-size="12">skeleton → containers → test → GCP</text>

  <!-- SETUP-PIPELINE (top-right, command) -->
  <rect x="720" y="60" width="200" height="78" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="820" y="86" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="bold">setup-pipeline.sh</text>
  <text x="820" y="104" text-anchor="middle" fill="#a7f3d0" font-size="13">Skeleton generator</text>
  <text x="820" y="121" text-anchor="middle" fill="#94a3b8" font-size="12">Creates nextflow-&lt;name&gt;/ boilerplate</text>

  <!-- DOCKER-RESOLVE (skill, mid-right) -->
  <rect x="720" y="175" width="200" height="78" rx="10" fill="#3b0764" stroke="#8b5cf6" stroke-width="2"/>
  <text x="820" y="201" text-anchor="middle" fill="#d8b4fe" font-size="15" font-weight="bold">Docker Resolve</text>
  <text x="820" y="219" text-anchor="middle" fill="#e9d5ff" font-size="13">Skill — Image resolver</text>
  <text x="820" y="236" text-anchor="middle" fill="#94a3b8" font-size="12">Registry → public → NOT_FOUND</text>

  <!-- DOCKER-BUILD (agent, bottom-right) -->
  <rect x="720" y="295" width="200" height="78" rx="10" fill="#1d3a6b" stroke="#3b82f6" stroke-width="2"/>
  <text x="820" y="321" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="bold">Docker Build</text>
  <text x="820" y="339" text-anchor="middle" fill="#bfdbfe" font-size="13">Agent — Container specialist</text>
  <text x="820" y="356" text-anchor="middle" fill="#94a3b8" font-size="12">Build &amp; push image to Artifact Registry</text>

  <!-- GET-TEST-DATA (agent, bottom-left) -->
  <rect x="150" y="295" width="200" height="78" rx="10" fill="#1d3a6b" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="321" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="bold">Get Test Data</text>
  <text x="250" y="339" text-anchor="middle" fill="#bfdbfe" font-size="13">Agent — Test data specialist</text>
  <text x="250" y="356" text-anchor="middle" fill="#94a3b8" font-size="12">Populate test_data/ + samplesheet</text>

  <!-- RUN-LOCAL (agent, bottom-center-left) -->
  <rect x="270" y="450" width="200" height="78" rx="10" fill="#1d3a6b" stroke="#3b82f6" stroke-width="2"/>
  <text x="370" y="476" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="bold">Run Local</text>
  <text x="370" y="494" text-anchor="middle" fill="#bfdbfe" font-size="13">Agent — Local executor</text>
  <text x="370" y="511" text-anchor="middle" fill="#94a3b8" font-size="12">Stub + real Nextflow run</text>

  <!-- RUN-GCP (agent, bottom-center-right) -->
  <rect x="590" y="450" width="200" height="78" rx="10" fill="#1d3a6b" stroke="#3b82f6" stroke-width="2"/>
  <text x="690" y="476" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="bold">Run GCP</text>
  <text x="690" y="494" text-anchor="middle" fill="#bfdbfe" font-size="13">Agent — GCP executor</text>
  <text x="690" y="511" text-anchor="middle" fill="#94a3b8" font-size="12">Google Batch run + diagnostics</text>

  <!-- SEQERA (skill, bottom) -->
  <rect x="390" y="580" width="200" height="68" rx="10" fill="#3b0764" stroke="#8b5cf6" stroke-width="2"/>
  <text x="490" y="604" text-anchor="middle" fill="#d8b4fe" font-size="15" font-weight="bold">Seqera AI CLI</text>
  <text x="490" y="622" text-anchor="middle" fill="#e9d5ff" font-size="13">Skill — Bioinformatics AI bridge</text>
  <text x="490" y="639" text-anchor="middle" fill="#94a3b8" font-size="12">Nextflow / nf-core domain questions</text>

  <!-- ══════════════════════════════════════════
       ARROWS
  ══════════════════════════════════════════ -->

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- User → Trinity -->
  <line x1="192" y1="200" x2="388" y2="194" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="285" y="188" text-anchor="middle" fill="#64748b" font-size="12">invokes</text>

  <!-- Trinity → setup-pipeline -->
  <line x1="590" y1="175" x2="718" y2="115" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="668" y="138" text-anchor="middle" fill="#10b981" font-size="12">Phase 1</text>

  <!-- Trinity → docker-resolve -->
  <line x1="590" y1="194" x2="718" y2="214" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="660" y="200" text-anchor="middle" fill="#8b5cf6" font-size="12">Phase 3a</text>

  <!-- docker-resolve → Trinity (return) -->
  <line x1="718" y1="228" x2="592" y2="218" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="4,3"/>
  <text x="655" y="242" text-anchor="middle" fill="#8b5cf6" font-size="12">strategy+url</text>

  <!-- Trinity → docker-build -->
  <line x1="590" y1="210" x2="718" y2="320" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="672" y="268" text-anchor="middle" fill="#3b82f6" font-size="12">Phase 3b</text>
  <text x="672" y="280" text-anchor="middle" fill="#3b82f6" font-size="12">(if NOT_FOUND)</text>

  <!-- Trinity → get-test-data -->
  <line x1="390" y1="210" x2="352" y2="293" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="340" y="258" text-anchor="middle" fill="#3b82f6" font-size="12">Phase 3c</text>
  <text x="340" y="270" text-anchor="middle" fill="#3b82f6" font-size="12">(parallel)</text>

  <!-- Trinity → run-local -->
  <line x1="460" y1="238" x2="390" y2="448" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="400" y="358" text-anchor="middle" fill="#3b82f6" font-size="12">Phase 4</text>

  <!-- Trinity → run-gcp -->
  <line x1="530" y1="238" x2="660" y2="448" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="618" y="358" text-anchor="middle" fill="#3b82f6" font-size="12">Phase 5</text>

  <!-- Trinity → seqera -->
  <line x1="490" y1="238" x2="490" y2="578" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="5,3"/>
  <text x="508" y="420" text-anchor="middle" fill="#8b5cf6" font-size="12">optional</text>

</svg>
